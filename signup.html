<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Create a Stripe Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="contact-page-wrapper">
  <div class="bg-grid"></div>
  <div class="bg-blob"></div>
  <div class="contact-form-container" style="max-width:500px">
  <div class="contact-form-card">
    <div class="text-center mb-4">
      <a href="index.html"><img src="stripe.png" width="80" alt="stripe logo"></a>
    </div>
    <h2>Create your Stripe account</h2>
    <p class="subtitle">Start accepting payments in minutes</p>
    <button class="btn-google mb-3"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google</button>
    <div class="divider">or</div>
    <form id="signupForm" class="needs-validation" novalidate>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="signupEmail" placeholder="Email" required>
        <label for="signupEmail">Email address</label>
        <div class="invalid-feedback">Please enter a valid email address.</div>
      </div>
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="signupName" placeholder="Full name" required>
        <label for="signupName">Full name</label>
        <div class="invalid-feedback">Please enter your name (at least 2 characters).</div>
      </div>
      <div class="form-floating mb-3">
        <select class="form-select" id="signupCountry" required>
          <option value="" selected disabled>Select your country</option>
          <option>United States</option><option>United Kingdom</option><option>Canada</option><option>Germany</option><option>France</option><option>India</option><option>Australia</option><option>Japan</option><option>Singapore</option><option>Brazil</option><option>Other</option>
        </select>
        <label for="signupCountry">Country</label>
        <div class="invalid-feedback">Please select a country.</div>
      </div>
      <div class="form-floating mb-2 position-relative">
        <input type="password" class="form-control" id="signupPassword" placeholder="Password" required minlength="8">
        <label for="signupPassword">Password</label>
        <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
        <div class="invalid-feedback">Password must be at least 8 characters.</div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="strength-meter flex-grow-1"><div class="bar"></div></div>
        <span class="strength-label ms-2" style="font-size:12px;font-weight:600;min-width:55px;text-align:right"></span>
      </div>
      <div class="form-check mb-4">
        <input type="checkbox" class="form-check-input" id="termsCheck" required>
        <label class="form-check-label" for="termsCheck" style="font-size:13px;color:var(--stripe-text-light)">I agree to Stripe's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        <div class="invalid-feedback">You must agree to the terms.</div>
      </div>
      <button type="submit" class="btn-stripe w-100 justify-content-center">Create account</button>
    </form>
    <p class="text-center mt-4" style="font-size:14px;color:var(--stripe-text-light)">Already have an account? <a href="signin.html" style="font-weight:600">Sign in</a></p>
  </div>
  </div>
</div>
<div class="toast-success"><i class="bi bi-check-circle-fill" style="color:var(--stripe-cyan)"></i><span class="toast-msg"></span></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
